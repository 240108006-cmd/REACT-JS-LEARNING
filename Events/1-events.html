<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htnml Events </title>
</head>
<body style="background-color: #414141; color: aliceblue;">
    <h2>Amazing image</h2>
    <div >
        <ul id="images">
            <li><img width="200px" id="photoshop" src="https://images.pexels.com/photos/3561339/pexels-photo-3561339.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="photoshop"></li>
            <li><img width="200px" id="japan" src="https://images.pexels.com/photos/3532553/pexels-photo-3532553.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="river" src="https://images.pexels.com/photos/3532551/pexels-photo-3532551.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="" ></li>
            <li><img width="200px" id="prayer" src="https://images.pexels.com/photos/2522671/pexels-photo-2522671.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><a style="color: aliceblue;" href="https://google.com" id="google">Google</a></li>
        </ul>
   </div>
</body>
<script>
    let ul = document.querySelector("#images")
    let owl_image = document.querySelector("#owl")
    ul.addEventListener("click",function(e){
        console.log("clicked inside the ul")
    })
    owl_image.addEventListener("click",function(e){
        console.log("clicked on the owl image")
        /*when we click on the owl image on writing only console.log
         we would find that both statements "clicked on the owl image"
        and "clicked inside the ul" would print as owl image is eventualy present insied ul
        but if we want to only print the "clicked on owl image"
        then we have to stop the propogation of the owl event listener to the 
        other blocks of code (or event listeners)*/
        e.stopPropagation()
    })
    let google_link = document.querySelector("#google") 
    google_link.addEventListener("click",function(e){
        // by default it would open the link for the site of google 
       // but if we want to stop it we can use prevent default
        e.preventDefault()
        // but this google link is a part of ul so it would continue to print 
        //the "clicked inside the ul" , so if we dont want to propogate(expand) we can use stopPropogation
        e.stopPropagation()
    })
</script>
