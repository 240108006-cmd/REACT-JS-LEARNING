<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button class="blue"> BLUE </button>
    <button class = "yellow"> YELLOW</button>
    <button class = "green"> GREEN </button>
</body>
<script>
    function colorchange (color){
        return function (){
            document.body.style.backgroundColor = `${color}`
        }
    }
    document.querySelector(".blue").addEventListener("click",colorchange("blue"))
    document.querySelector(".yellow").addEventListener("click",colorchange("yellow"))
    document.querySelector(".green").addEventListener("click",colorchange("green"))
</script>
</html>
