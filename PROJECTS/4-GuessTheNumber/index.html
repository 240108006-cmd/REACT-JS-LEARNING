<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: black;">
    <div class="header"> Number guessing game </div>
    <div class="main">
        <pre >    Try and guess a random number between 1 and 100   
        <br>   You have 10 attempts to guess the right number</pre>
        <p class="maintext"> Guess a number </p>
        <input type="text" class="guessslot">
        <div class="resultouter">
            <input type="submit" value="Submit guess" class="submitbutton">
            <p style="font-size: 1.2rem;">Previous Guesses:</p><p class="prevguess"></p>
            <p style="font-size: 1.2rem;"> Guesses Remaining:</p><p class="remguess"></p>
            <p class="resultmsg" style="font-size: 1.25rem;"></p>
        </div>

        
    </div>
</body>
<script src="script.js"></script>
</html>
